<html lang="ar" dir="rtl">

<head>

    <style>
        body {
            background: transparent;
            overflow: hidden;
            margin: 0;

        }

        .reels-wrapper {
            height: 100vh;
            height: 100dvh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: auto;
        }

        .reels-wrapper::-webkit-scrollbar {
            display: none;
        }

        .reels-wrapper.locked {
            overflow-y: hidden !important;
            scroll-snap-type: none !important;
        }

        .reel-item {
            height: 100vh;
            height: 100dvh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reel-content-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile: wrapper and video fill entire reel-item */
        .reel-content-wrapper {
            width: 100%;
            height: 100%;
        }

        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer;
            background: #000;
            overflow: hidden;
        }

        .video-target {
            width: 100%;
            height: 100%;
        }

        .reel-video,
        .reel-iframe {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        /* Landscape / Non-Portrait Video Adjustment */
        .video-container.is-landscape .reel-video,
        .video-container.is-landscape .reel-iframe,
        .video-container.is-landscape iframe {
            object-fit: contain !important;
            background: #000;
        }

        /* Fullscreen Specific Fixes */
        .video-container:fullscreen {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container:fullscreen .reel-video,
        .video-container:fullscreen .reel-iframe,
        .video-container:fullscreen iframe {
            object-fit: contain !important;
            width: 100% !important;
            height: 100% !important;
        }

        /* Vendor Prefixes for Fullscreen */
        .video-container:-webkit-full-screen { background: #000; display: flex; align-items: center; justify-content: center; }
        .video-container:-webkit-full-screen .reel-video { object-fit: contain !important; }
        .video-container:-moz-full-screen { background: #000; display: flex; align-items: center; justify-content: center; }
        .video-container:-moz-full-screen .reel-video { object-fit: contain !important; }
        .video-container:-ms-fullscreen { background: #000; display: flex; align-items: center; justify-content: center; }
        .video-container:-ms-fullscreen .reel-video { object-fit: contain !important; }

        .video-protect-overlay {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0);
        }

        .play-pause-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 6;
        }

        .play-pause-overlay i {
            font-size: 50px;
            color: white;
        }

        .paused .play-pause-overlay {
            opacity: 1;
        }

        .reel-ui-container {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.85) 0%, transparent 40%, transparent 70%, rgba(0, 0, 0, 0.3) 100%);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px 20px 90px;
            z-index: 10;
        }

        .reel-info {
            pointer-events: auto;
            max-width: 82%;
        }

        .reel-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .reel-desc {
            font-size: 13px;
            opacity: 0.8;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-watch-delayed {
            opacity: 0;
            max-height: 0;
            transition: 0.5s;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.1);
            width: 100%;
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            border-radius: 8px;
        }

        .btn-watch-delayed.visible {
            opacity: 1;
            max-height: 50px;
            margin-top: 12px;
            pointer-events: auto;
            padding: 12px;
        }

        .btn-watch-delayed.active-red {
            background: var(--accent);
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
        }

        .reel-actions {
            position: absolute;
            left: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: auto;
            align-items: center;
            z-index: 15;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn i {
            font-size: 28px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        .action-btn span {
            font-size: 11px;
            font-weight: 600;
        }

        .reel-top-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            left: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
            z-index: 15;
        }

        .control-btn {
            width: 38px;
            height: 38px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            backdrop-filter: blur(10px);
            cursor: pointer;
            border: none;
            text-decoration: none;
        }

        .desktop-info-panel {
            display: none;
            width: 340px;
            height: 600px;
            background: rgba(18, 18, 20, 0.85);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: none;
            border-radius: 0px 35px 35px 0 !important;
            padding: 35px;
            flex-direction: column;
            gap: 20px;
            box-shadow: 15px 30px 80px rgba(0, 0, 0, 0.6);
            animation: fadeInPanel 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            direction: rtl;
            text-align: right;
        }

        @keyframes fadeInPanel {
            from {
                opacity: 0;
                transform: translateX(15px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .side-poster {
            width: 100%;
            height: 190px;
            border-radius: 18px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .side-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: right;
        }

        .side-title {
            font-size: 24px;
            font-weight: 900;
            color: white;
            line-height: 1.2;
            text-align: right;
        }

        .side-desc {
            font-size: 13px;
            opacity: 0.55;
            line-height: 1.7;
            color: #ddd;
            flex: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            text-align: right;
        }

        .desktop-nav-arrows {
            display: none;
        }

        .ad-overlay {

            inset: 0;
            z-index: 10000;
            background: #000;
            display: none;
            align-items: center;
            justify-content: center;

        }

        }

        .ad-video-bg {

            inset: 0;
            width: 100%;
            height: 100%;

        }

        .ad-ui-layer {

            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;

        .ad-skip-container {

            align-items: center;

        .ad-glass-card {

            border: 1px solid rgba(255, 255, 255, 0.12);

            flex-direction: column;
            align-items: center;

        .ad-timer-ring {

            border-radius: 50%;
            border: 3px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 22px;
            color: var(--accent);
        }

        .details-modal,
        .share-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .details-modal.active,
        .share-modal.active {

        }

        .modal-card {
            background: var(--surface);
            width: 100%;
            max-width: 600px;
            border-radius: 24px 24px 0 0;
            overflow: hidden;
            position: relative;
            animation: sheetSlide 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            border-top: 1px solid var(--border);
            max-height: 80vh;
            overflow-y: auto;
        }

        @keyframes sheetSlide {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        @media (min-width: 1024px) {
            body {
                background: radial-gradient(ellipse at 60% 50%, #200808 0%, #0d0d10 45%, #060608 100%);
            }

            .app-container {
                background: transparent !important;
            }

            main {
                background: transparent !important;

            }

            .reels-wrapper {
                height: 100vh;
                overflow-y: scroll;
                scroll-snap-type: y mandatory;

            }

            .reel-item {

                height: 100vh;

            .video-container {

            .desktop-info-panel {

            .nav-arrow-btn {

        @media (min-width: 1024px) {

        .ad-overlay {

        }

        .ad-mini-timer {

            justify-content: center;
            background: rgba(0, 0, 0, 0.4);

    <script>
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        let isGlobalMuted = isIOS; // Start muted on iOS to ensure autoplay works
        let watchedCount = 0;
        let lastSeenIdx = -1;
        let currentReels = [];
        let activeWatchSeconds = 0;
        let claimablePoints = 0;
        let currentActiveReel = null;
        let ytPlayers = {}; // Track YouTube players by reel index

        async function renderReels() {
            const reelLang = getCurrentLang();
            const reelT = translations[reelLang];
            const premium = await isPremium();

            currentReels = shuffleArray(await getSeries());
            const container = document.getElementById('reels-container');
            container.innerHTML = currentReels.map((s, idx) => `
                    <div class="reel-item" id="reel-${idx}" data-video="${s.trailer_url || s.video || s.link}">
                        <div class="reel-content-wrapper">

        function setupReelObserver() {
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const idParts = entry.target.id.split('-');
                        if (idParts[0] === 'reel') {
                            const idx = parseInt(idParts[1]);
                            console.log(`Reel ${idx} intersecting. lastSeenIdx: ${lastSeenIdx}, watchedCount: ${watchedCount}`);

                            // Only count if it's a new reel (going forward)
                            if (idx > lastSeenIdx) {
                                watchedCount++;
                                lastSeenIdx = idx;

                                // Increment View
                                const s = currentReels[idx];
                                if (s) {
                                    incrementView(s.id);
                                }

                                const interval = parseInt(localStorage.getItem('reelar_ad_interval') || '3');
                                console.log(`Checking ad trigger: watchedCount=${watchedCount}, interval=${interval}`);
                                if (watchedCount >= interval) {
                                    console.log('Triggering Ad Injection...');
                                    watchedCount = 0;
                                    injectDynamicAd(entry.target).then(adEl => {
                                        if (adEl) obs.observe(adEl);
                                    });
                                }
                            } else {
                            lastSeenIdx = idx;
                        }
                        currentActiveReel = entry.target;
                        loadUniversalVideo(entry.target);

                        // Infinite Loop Trigger
                        if (idx === currentReels.length - 1) {
                            appendMoreReels(obs);
                        }
                    }
                } else {
                    if (currentActiveReel === entry.target) {
                        currentActiveReel = null;
                    }
                    if (!entry.target.classList.contains('ad-item')) {
                        pauseUniversalVideo(entry.target);
                    }
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.reel-item').forEach(i => obs.observe(i));
    }

        window.handleAdClick = (adId, targetUrl) => {
            if (targetUrl) {
                trackAdEvent(adId, 'click');
                window.open(targetUrl, '_blank');
            }
        };

        function startAdTimer(adId, countdown) {
            const adItem = document.getElementById(adId);
            const adVideo = adItem.querySelector('video');
            if (adVideo) {
                adVideo.muted = isGlobalMuted;
                adVideo.play().catch(() => {
                    adVideo.muted = true;
                    adVideo.play();
                });
            }

            const miniTimer = document.getElementById('mini-timer-' + adId);
            const miniDisplay = document.getElementById('mini-countdown-' + adId);
            const premiumUi = document.getElementById('premium-ui-' + adId);
            const timerEl = document.getElementById('timer-' + adId);
            const btn = document.getElementById('btn-' + adId);

            let miniTimeLeft = countdown + 5;
            const miniItv = setInterval(() => {
                miniTimeLeft--;
                if (miniDisplay) miniDisplay.innerText = miniTimeLeft;
                if (miniTimeLeft <= 0) {
                    clearInterval(miniItv);
                    if (miniTimer) miniTimer.remove();
                    if (premiumUi) premiumUi.style.display = 'flex';

                    let timeLeft = countdown;
                    const itv = setInterval(() => {
                        timeLeft--;
                        if (timerEl) timerEl.innerText = timeLeft;
                        if (timeLeft <= 0) {
                            clearInterval(itv);
                            if (btn) {
                                btn.style.opacity = '1';
                                btn.style.pointerEvents = 'auto';
                                btn.innerText = btn.innerText.includes('مكافأة') ? 'تخطي والحصول على الجائزة' : 'تخطي الآن';
                            }
                        }
                    }, 1000);
                }
            }, 1000);
        }

        window.handleAdSkip = (adId, type, reward) => {
            if (type === 'rewarded') {
                addBalance(reward);
                showToast(`تمت إضافة ${reward} نقطة لمكافأتك!`);
            }
            removeAdAndContinue(adId);
        };

        window.removeAdAndContinue = (adId) => {
            const adItem = document.getElementById(adId);
            const wrapper = document.getElementById('reels-container');
            wrapper.classList.remove('locked');

            // Scroll to next item first
            window.scrollReels(1);

            // Remove the ad element after scroll finishes
            setTimeout(() => {
                adItem.remove();
            }, 800);
        };

        window.triggerAdOverlay = () => { };

        function loadUniversalVideo(reelItem) {
            const url = reelItem.dataset.video;
            const target = reelItem.querySelector('.video-target');
            const watchBtn = reelItem.querySelector('.btn-watch-delayed');
            if (target.children.length === 0) {
                if (url.includes('youtube.com') || url.includes('youtu.be')) {
                    const ytId = url.split('v=')[1] || url.split('/').pop();
                    const reelIdx = reelItem.id.split('-')[1];
                    const divId = `yt-player-${reelIdx}`;
                    target.innerHTML = `<div id="${divId}"></div>`;
                    reelItem.querySelector('.video-container').classList.add('is-landscape');

                    const createYT = () => {
                        ytPlayers[reelIdx] = new YT.Player(divId, {
                            height: '100%',
                            width: '100%',
                            videoId: ytId,
                            playerVars: {
                                'autoplay': 1,
                                'mute': 1,
                                'controls': 0,
                                'loop': 1,
                                'playlist': ytId,
                                'modestbranding': 1,
                                'rel': 0
                            }
                        });
                    };

                    if (window.YT && YT.Player) {
                        createYT();
                    } else {
                        window.onYouTubeIframeAPIReady = createYT;
                    }
                } else if (url.toLowerCase().includes('.m3u8')) {
                    const reelIdx = reelItem.id.split('-')[1];
                    const s = currentReels[reelIdx];
                    const poster = s ? (s.poster_url || s.poster) : '';
                    const video = document.createElement('video');
                    video.className = 'reel-video'; video.loop = true; video.playsInline = true; video.muted = isGlobalMuted;
                    video.poster = poster;
                    video.onloadedmetadata = () => {
                        const container = reelItem.querySelector('.video-container');
                        if (video.videoWidth / video.videoHeight > 1.1) container.classList.add('is-landscape');
                        else container.classList.remove('is-landscape');
                    };
                    target.appendChild(video);
                    if (Hls.isSupported()) {
                        const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => { }));
                        hls.on(Hls.Events.ERROR, (event, data) => {
                            if (data.fatal) console.error('HLS Reel Error:', data.type);
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url; video.play().catch(() => { });
                    }
                } else {
                    const reelIdx = reelItem.id.split('-')[1];
                    const s = currentReels[reelIdx];
                    const poster = s ? (s.poster_url || s.poster) : '';
                    target.innerHTML = `<video class="reel-video" loop playsinline ${isGlobalMuted ? 'muted' : ''} poster="${poster}"><source src="${url}"></video>`;
                    const v = target.querySelector('video');
                    v.onloadedmetadata = () => {
                        const container = reelItem.querySelector('.video-container');
                        if (v.videoWidth / v.videoHeight > 1.1) container.classList.add('is-landscape');
                        else container.classList.remove('is-landscape');
                    };
                    v.play().catch(() => {
                        v.muted = true;
                        v.play().catch(() => {});
                    });
                }
            } else {
                const v = target.querySelector('video');
                if (v) { 
                    v.muted = isGlobalMuted; // Respect global mute state
                    if (v.videoWidth > 0) {
                        const container = reelItem.querySelector('.video-container');
                        if (v.videoWidth / v.videoHeight > 1.1) container.classList.add('is-landscape');
                        else container.classList.remove('is-landscape');
                    }
                    v.play().catch(() => {
                        v.muted = true;
                        v.play().catch(() => {});
                    }); 
                }
            }
            if (watchBtn) {
                watchBtn.classList.remove('visible', 'active-red');
                clearTimeout(reelItem.t1); clearTimeout(reelItem.t2);
                reelItem.t1 = setTimeout(() => watchBtn.classList.add('visible'), 3000);
                reelItem.t2 = setTimeout(() => watchBtn.classList.add('active-red'), 6000);
            }
        }

        function pauseUniversalVideo(reelItem) {
            const v = reelItem.querySelector('video');
            if (v) { v.pause(); v.currentTime = 0; }
            const watchBtn = reelItem.querySelector('.btn-watch-delayed');
            if (watchBtn) watchBtn.classList.remove('visible', 'active-red');
        }

        window.togglePlay = (el) => {
            // Unmute globally on first interaction if needed
            if (isGlobalMuted) unmuteAllOnInteraction();

            const v = el.querySelector('video');
            const reelItem = el.closest('.reel-item');
            const reelIdx = reelItem.id.split('-')[1];
            const ytPlayer = ytPlayers[reelIdx];

            if (ytPlayer && ytPlayer.getPlayerState) {
                const state = ytPlayer.getPlayerState();
                if (state === YT.PlayerState.PLAYING) {
                    ytPlayer.pauseVideo();
                    el.classList.add('paused');
                } else {
                    ytPlayer.playVideo();
                    el.classList.remove('paused');
                }
            } else if (v) {
                if (v.paused) { 
                    v.muted = isGlobalMuted; // Sync with global state
                    v.play(); 
                    el.classList.remove('paused'); 
                } else { 
                    v.pause(); 
                    el.classList.add('paused'); 
                }
            }
        };

        window.toggleLike = (btn) => {
            const icon = btn.querySelector('i');
            const liked = icon.style.color === 'var(--accent)' || icon.style.color === 'rgb(229, 9, 20)';
            icon.style.color = liked ? 'white' : 'var(--accent)';
            icon.style.transform = liked ? 'scale(1)' : 'scale(1.4)';
            setTimeout(() => icon.style.transform = 'scale(1)', 300);
        };

        window.scrollReels = (direction) => {
            const wrapper = document.getElementById('reels-container');
            if (wrapper.classList.contains('locked')) return;

            const itemHeight = window.innerHeight;
            wrapper.scrollBy({
                top: direction * itemHeight,
                behavior: 'smooth'
            });
        };

        window.toggleMute = (btn, e) => {
            if (e) e.stopPropagation();
            isGlobalMuted = !isGlobalMuted;
            document.querySelectorAll('video').forEach(v => {
                v.muted = isGlobalMuted;
                // Force audio context unlock on iOS
                if (!isGlobalMuted && !v.paused) v.play().catch(() => {});
            });
            // Specifically target ad videos too
            document.querySelectorAll('.ad-video-bg').forEach(v => v.muted = isGlobalMuted);
            
            Object.values(ytPlayers).forEach(p => {
                if (p && p.unMute && p.mute) {
                    if (isGlobalMuted) p.mute();
                    else p.unMute();
                }
            });

            // Update All Overlays
            document.querySelectorAll('.unmute-overlay').forEach(overlay => {
                if (isGlobalMuted) overlay.classList.add('visible');
                else overlay.classList.remove('visible');
            });

            document.querySelectorAll('.mute-toggle i').forEach(i => i.className = isGlobalMuted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high');
        };

        // UI Auto-hide Logic
        let uiTimeout;
        function showReelUI() {
            document.querySelectorAll('.video-container').forEach(c => c.classList.remove('ui-hidden'));
            clearTimeout(uiTimeout);
            uiTimeout = setTimeout(() => {
                document.querySelectorAll('.video-container').forEach(c => c.classList.add('ui-hidden'));
            }, 3000);
        }

        // Add listeners to all video containers for UI show/hide
        document.addEventListener('mousemove', showReelUI);
        document.addEventListener('touchstart', showReelUI);
        document.addEventListener('click', showReelUI);

        window.toggleReelFullscreen = (btn, e) => {
            if (e) e.stopPropagation();
            const container = btn.closest('.video-container');
            const icon = btn.querySelector('i');
            const isLandscapeVideo = container.classList.contains('is-landscape');
            
            showReelUI(); // Ensure UI is shown when toggling
            
            // iPhone Safari Fallback: iPhones only support fullscreen on the <video> element itself
            const v = container.querySelector('video');
            const isIPhone = /iPhone|iPod/.test(navigator.userAgent);
            if (isIPhone) {
                if (v && v.webkitEnterFullscreen) {
                    v.webkitEnterFullscreen();
                } else if (container.querySelector('iframe') || container.querySelector('.player-iframe')) {
                    showToast('تكبير الشاشة لليوتيوب غير مدعوم في متصفح الآيفون، يرجى تدوير الجهاز', 'fa-mobile-screen-button');
                }
                return;
            }
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
                const req = container.requestFullscreen || container.webkitRequestFullscreen || container.mozRequestFullScreen || container.msRequestFullscreen;
                if (req) {
                    const promise = container.requestFullscreen ? container.requestFullscreen() : 
                                   container.webkitRequestFullscreen ? container.webkitRequestFullscreen() :
                                   container.mozRequestFullScreen ? container.mozRequestFullScreen() :
                                   container.msRequestFullscreen();
                    
                    if (promise && promise.then) {
                        promise.then(() => {
                            if (isLandscapeVideo && screen.orientation && screen.orientation.lock) {
                                screen.orientation.lock('landscape').catch(err => {});
                            }
                        }).catch(err => {});
                    }
                }
                icon.className = 'fa-solid fa-compress';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
                icon.className = 'fa-solid fa-expand';
            }
        };

        // Sync icon state on escape key or system exit
        document.addEventListener('fullscreenchange', () => {
            const icons = document.querySelectorAll('.control-btn i.fa-expand, .control-btn i.fa-compress');
            icons.forEach(icon => {
                if (document.fullscreenElement) {
                    icon.className = 'fa-solid fa-compress';
                } else {
                    icon.className = 'fa-solid fa-expand';
                }
            });
        });

        function unmuteAllOnInteraction() {
            if (!isGlobalMuted) return; // Already unmuted
            
            isGlobalMuted = false;
            console.log('Global Unmute Triggered');

            // Unmute all HTML5 videos
            document.querySelectorAll('video').forEach(v => {
                v.muted = false;
                if (!v.paused) v.play().catch(() => {});
            });

            // Unmute YouTube players
            Object.values(ytPlayers).forEach(p => {
                if (p && p.unMute) p.unMute();
            });

            // Update UI
            document.querySelectorAll('.mute-toggle i').forEach(i => {
                i.className = 'fa-solid fa-volume-high';
            });
        }

        // Global listeners for first interaction to enable sound
        document.addEventListener('click', unmuteAllOnInteraction, { once: true });
        document.addEventListener('touchstart', unmuteAllOnInteraction, { once: true });
        document.addEventListener('keydown', unmuteAllOnInteraction, { once: true });

        window.openDetails = async (id) => {
            const series = await getSeries();
            const s = series.find(s => s.id == id);
            if (!s) return;
            const poster = s.poster_url || s.poster;
            document.getElementById('modal-content').innerHTML = `<img src="${poster}" style="width:100%; height:250px; object-fit:cover;"><div style="padding:25px;"><h2 style="color:white;">${s.title}</h2><p style="color:#ccc;">${s.description || ''}</p><a href="series.html?id=${s.id}" class="btn btn-accent" style="width:100%; justify-content:center;">شاهد المسلسل</a></div>`;
            document.getElementById('details-modal').classList.add('active');
        };
        window.closeDetails = () => document.getElementById('details-modal').classList.remove('active');

        window.shareContent = async (id) => {
            const series = await getSeries();
            const s = series.find(s => s.id == id);
            if (!s) return;
            const baseUrl = await db.getAppBaseUrl();
            const url = baseUrl + '/series.html?id=' + id;
            document.getElementById('share-wa').href = `https://wa.me/?text=شاهد ${s.title} ${url}`;
            document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
            document.getElementById('share-tw').href = `https://twitter.com/intent/tweet?url=${url}`;
            window.currentShareUrl = url;
            document.getElementById('share-modal').classList.add('active');
        };
        window.closeShare = () => document.getElementById('share-modal').classList.remove('active');
        window.copyReelLink = async () => { await navigator.clipboard.writeText(window.currentShareUrl); showToast('تم نسخ الرابط بنجاح!', 'fa-copy'); closeShare(); };

        function triggerAdOverlay() {
            const overlay = document.getElementById('ad-overlay'); const wrapper = document.querySelector('.reels-wrapper');
            overlay.classList.add('active'); wrapper.classList.add('locked');
            let timeLeft = 5;
            const adInterval = setInterval(() => {
                timeLeft--; document.getElementById('ad-timer').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(adInterval); overlay.classList.remove('active'); wrapper.classList.remove('locked'); }
            }, 1000);
        }

        ['click', 'touchstart', 'wheel', 'keydown'].forEach(evt => {
            document.addEventListener(evt, unmuteAllOnInteraction, { once: true });
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderReels();

            // Listen for background data updates
            window.addEventListener('reelar-series-updated', (e) => {
                console.log('Refreshing reels with fresh data...');
                renderReels();
            });

            // Reward tracking interval
            setInterval(() => {
                if (!currentActiveReel) return;
                const video = currentActiveReel.querySelector('video');
                const reelIdx = currentActiveReel.id.split('-')[1];
                const ytPlayer = ytPlayers[reelIdx];

                let isWatching = false;

                if (ytPlayer && ytPlayer.getPlayerState) {
                    isWatching = (ytPlayer.getPlayerState() === YT.PlayerState.PLAYING);
                } else if (video) {
                    isWatching = !video.paused && video.readyState >= 2;
                }

                if (isWatching) {
                    activeWatchSeconds++;
                    const currentCycle = activeWatchSeconds % 40;
                    const pctProgress = (currentCycle / 40) * 100;

                    // Update all progress bars (to keep them in sync)
                    document.querySelectorAll('.watch-reward-progress').forEach(el => {
                        el.style.background = `conic-gradient(var(--accent) ${pctProgress}%, transparent 0%)`;
                    });

                    const earned = Math.floor(activeWatchSeconds / 40);
                    if (earned > claimablePoints) {
                        claimablePoints = earned;
                        document.querySelectorAll('.player-claim-btn').forEach(btn => {
                            btn.style.display = 'flex';
                        });
                        document.querySelectorAll('.player-claim-count').forEach(span => {
                            span.innerText = claimablePoints;
                        });
                    }
                }
            }, 1000);
        });

        window.claimWatchPoints = (e) => {
            e.stopPropagation();
            if (claimablePoints > 0) {
                addPoints(claimablePoints);
                showToast(`🎉 حصلت على ${claimablePoints} نقطة لمشاهدتك!`);

                activeWatchSeconds = activeWatchSeconds % 40;
                claimablePoints = 0;

                document.querySelectorAll('.player-claim-btn').forEach(btn => {
                    btn.style.display = 'none';
                });

                const pctProgress = (activeWatchSeconds / 40) * 100;
                document.querySelectorAll('.watch-reward-progress').forEach(el => {
                    el.style.background = `conic-gradient(var(--accent) ${pctProgress}%, transparent 0%)`;
                });
            }
        };

        function showToast(msg) {
            // Check if toast exists, otherwise use alert or create one
            const toast = document.createElement('div');
            toast.className = 'toast active';
            toast.style.cssText = 'position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:white; color:black; padding:12px 24px; border-radius:50px; font-weight:700; z-index:10000; box-shadow:0 10px 30px rgba(0,0,0,0.3);';
            toast.innerHTML = `<i class="fa-solid fa-circle-check" style="color:#22c55e; margin-left:8px;"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
            window.addEventListener('resize', () => {
            currentActiveReel = null;
            setupReelObserver();
        });

        // --- Logout Logic ---
        document.body.insertAdjacentHTML('beforeend', `
            <div id="logout-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 99999; display: none; align-items: center; justify-content: center; padding: 20px;">
                <div style="background: #161618; width: 100%; max-width: 380px; border-radius: 25px; padding: 35px; border: 1px solid rgba(255,255,255,0.08); text-align: center;">
                    <div style="width: 70px; height: 70px; background: rgba(239, 68, 68, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: #ef4444; font-size: 30px;">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </div>
                    <h3 style="font-size: 22px; margin-bottom: 10px;">تسجيل الخروج</h3>
                    <p style="color: var(--text-muted); font-size: 15px; margin-bottom: 30px; line-height: 1.6;">هل أنت متأكد أنك تريد تسجيل الخروج من حسابك؟</p>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <button onclick="logout()" class="btn btn-accent" style="background: #ef4444; border-color: #ef4444; justify-content: center;">نعم، خروج</button>
                        <button onclick="closeLogoutModal()" class="btn btn-outline" style="justify-content: center;">إلغاء</button>
                    </div>
                </div>
            </div>
        `);

        function openLogoutModal() { document.getElementById('logout-modal').style.display = 'flex'; }
        function closeLogoutModal() { document.getElementById('logout-modal').style.display = 'none'; }
    </script>
</body>

</html>
