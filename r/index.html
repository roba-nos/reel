<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReelArab | الرئيسية</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hero-container {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
        }

        /* Main Slider */
        .hero-slider {
            flex: 2.5;
            height: 420px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .hero-slide {
            width: 100%;
            height: 100%;
            position: absolute;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .hero-slide.active {
            opacity: 1;
            z-index: 1;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-content {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg) 2%, rgba(0, 0, 0, 0.1) 50%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            z-index: 2;
        }

        /* Side List with Progress */
        .hero-side-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 420px;
        }

        .side-item {
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: var(--transition);
            border: 1px solid var(--border);
            overflow: hidden;
            flex: 1;
            position: relative;
        }

        .side-item.active {
            border-color: var(--accent);
            background: var(--surface-hover);
        }

        .side-item-content {
            display: flex;
            gap: 10px;
            padding: 8px;
            flex: 1;
            align-items: center;
        }

        .side-thumb {
            width: 45px;
            height: 60px;
            border-radius: 6px;
            object-fit: cover;
        }

        .side-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .side-info h4 {
            font-size: 13px;
            margin-bottom: 2px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .side-info span {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* Progress Bar inside Side Card */
        .side-progress-container {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            display: block;
            /* Always show the track for a better UI */
            position: absolute;
            bottom: 0;
            left: 0;
        }

        .side-progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.05s linear;
            box-shadow: 0 0 10px var(--accent);
        }

        /* Prevent page jump on filter */
        .series-grid {
            /* Now handled dynamically in JS */
        }

        .side-item:not(.active) .side-progress-bar {
            display: none;
        }

        /* Categories Scroll */
        .category-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0 15px;
            scrollbar-width: none;
        }

        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        .cat-tag {
            background: var(--surface);
            padding: 8px 22px;
            border-radius: 100px;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .cat-tag.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
        }

        @media (max-width: 1024px) {
            .hero-container {
                flex-direction: column;
                gap: 15px;
                margin-bottom: 30px;
                width: 100%;
            }

            .hero-slider {
                height: 320px;
                border-radius: 15px;
                width: 100%;
                flex: none;
            }

            .hero-content {
                padding: 20px;
                width: 100%;
            }

            .hero-content h1 {
                font-size: 28px !important;
                margin-bottom: 15px !important;
            }

            .hero-content .btn {
                padding: 8px 16px;
                font-size: 13px;
            }

            .hero-side-list {
                height: auto;
                flex-direction: row;
                overflow-x: auto;
                padding: 5px 0;
                gap: 10px;
                scrollbar-width: none;
                width: 100%;
                flex: none;
            }

            .hero-side-list::-webkit-scrollbar {
                display: none;
            }

            .side-item {
                min-width: 200px;
                flex: none;
                height: 80px;
                border-radius: 10px;
            }

            .side-item-content {
                padding: 6px;
            }

            .side-thumb {
                width: 35px;
                height: 50px;
            }

            .side-info h4 {
                font-size: 11px;
            }

            .side-progress-container {
                height: 3px;
            }

            main {
                padding: 15px 15px 100px !important;
                width: 100%;
            }
        }

        /* ===== Search Overlay ===== */
        .search-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.97);
            backdrop-filter: blur(20px);
            z-index: 9000;
            display: none;
            flex-direction: column;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }

        .search-overlay.active {
            display: flex;
        }

        .search-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .search-input-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 0 18px;
            height: 52px;
            transition: border-color 0.2s;
        }

        .search-input-container:focus-within {
            border-color: var(--accent);
        }

        .search-input-container i {
            color: rgba(255,255,255,0.4);
            font-size: 16px;
            flex-shrink: 0;
        }

        .search-input-container input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            font-family: inherit;
            direction: rtl;
        }

        .search-input-container input::placeholder {
            color: rgba(255,255,255,0.35);
        }

        .close-search {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .close-search:hover {
            background: var(--accent);
        }

        .search-results {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        /* PC-only Logout styles */
        @media (max-width: 768px) {
            .nav-item-logout-pc { display: none !important; }
        }
        @media (min-width: 769px) {
            .nav-item-logout-pc { margin-top: auto; color: #ef4444 !important; }
            .nav-item-logout-pc:hover { background: rgba(239, 68, 68, 0.1) !important; }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <nav class="bottom-nav">

                <h1 style="color: var(--accent); font-size: 35px; font-weight: 800;">Reel<span
                        style="color: white;">Arab</span></h1>

        <main style="flex: 1; padding: 20px 40px; min-width: 0;">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px;">
                <h1 style="color: var(--accent); font-size: 28px; font-weight: 800; white-space: nowrap;">Reel<span
                        style="color: white;">Arab</span></h1>
                
                <div style="flex: 1; display: flex; justify-content: flex-end; gap: 12px;">
                    <!-- Search Trigger Button -->
                    <button id="search-btn" onclick="openSearch()" class="search-trigger-btn">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <span data-t="search_placeholder">بحث...</span>
                    </button>

                    <a href="login.html" id="header-profile-link"
                        style="width: 42px; height: 42px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); color: white; text-decoration: none; transition: 0.3s; flex-shrink: 0;">
                        <i class="fa-solid fa-user"></i>
                    </a>
                </div>
            </header>

            <style>
                .search-trigger-btn {
                    background: rgba(255, 255, 255, 0.05);
                    border: 1px solid rgba(255, 255, 255, 0.1);
                    border-radius: 100px;
                    padding: 0 20px;
                    height: 42px;
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    color: rgba(255, 255, 255, 0.5);
                    cursor: pointer;
                    transition: 0.3s;
                    font-size: 14px;
                    font-weight: 600;
                    max-width: 200px;
                    width: 100%;
                }

                .search-trigger-btn:hover {
                    background: rgba(255, 255, 255, 0.1);
                    border-color: var(--accent);
                    color: white;
                }

                /* Full Screen Search Overlay */
                .search-overlay {
                    position: fixed;
                    inset: 0;
                    background: rgba(0, 0, 0, 0.98);
                    backdrop-filter: blur(20px);
                    z-index: 50000;
                    display: none;
                    flex-direction: column;
                    padding: 40px 20px;
                    animation: searchFade 0.3s ease;
                }

                .search-overlay.active {
                    display: flex;
                }

                .search-header {
                    max-width: 800px;
                    margin: 0 auto 40px;
                    width: 100%;
                    display: flex;
                    align-items: center;
                    gap: 20px;
                }

                .search-input-wrapper {
                    flex: 1;
                    position: relative;
                }

                .search-input-wrapper i {
                    position: absolute;
                    left: 20px;
                    top: 50%;
                    transform: translateY(-50%);
                    color: var(--accent);
                    font-size: 20px;
                }

                .search-input-wrapper input {
                    width: 100%;
                    background: rgba(255, 255, 255, 0.05);
                    border: 1px solid rgba(255, 255, 255, 0.1);
                    border-radius: 20px;
                    padding: 20px 20px 20px 60px;
                    color: white;
                    font-size: 20px;
                    font-weight: 700;
                    outline: none;
                }

                .search-input-wrapper input:focus {
                    border-color: var(--accent);
                    background: rgba(255, 255, 255, 0.08);
                }

                .close-search {
                    width: 50px;
                    height: 50px;
                    border-radius: 50%;
                    background: rgba(255, 255, 255, 0.05);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: white;
                    cursor: pointer;
                    font-size: 20px;
                    transition: 0.3s;
                }

                .close-search:hover {
                    background: var(--accent);
                    transform: rotate(90deg);
                }

                .search-results {
                    max-width: 1200px;
                    margin: 0 auto;
                    width: 100%;
                    flex: 1;
                    overflow-y: auto;
                    padding: 40px 20px;
                    scrollbar-width: thin;
                    scrollbar-color: var(--accent) transparent;
                }

                /* Ensure grid inside results is consistent */
                .search-results.series-grid {
                    display: grid;
                    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                    grid-auto-rows: max-content; /* Prevent vertical stretching */
                    gap: 30px;
                    align-items: start;
                }

                @keyframes searchFade {
                    from { opacity: 0; transform: translateY(-20px); }
                    to { opacity: 1; transform: translateY(0); }
                }

                @media (max-width: 768px) {
                    .search-results.series-grid {
                        grid-template-columns: repeat(3, 1fr);
                        gap: 10px;
                    }
                    .search-header { margin-bottom: 20px; }
                    .search-input-wrapper input { font-size: 16px; padding: 15px 15px 15px 45px; }
                    .search-input-wrapper i { left: 15px; font-size: 16px; }
                    
                    /* Adjust card info for 3-column layout */
                    .search-results .card-info h4 { font-size: 11px; }
                    .search-results .card-info p { font-size: 9px; }
                }

                @media (max-width: 600px) {
                    .search-trigger-btn span { display: none; }
                    .search-trigger-btn { width: 42px; padding: 0; justify-content: center; }
                }

                /* Onboarding Spotlight Tour Styles */
                .tour-overlay {
                    position: fixed;
                    inset: 0;
                    background: transparent;
                    z-index: 60000;
                    display: none;
                    pointer-events: none; /* Let clicks pass through to the spotlight hole if needed */
                    transition: 0.3s;
                }

                /* The Dark Mask with a Hole */
                .tour-mask {
                    position: fixed;
                    inset: 0;
                    background: rgba(0, 0, 0, 0.85);
                    z-index: 59999;
                    display: none;
                    pointer-events: auto;
                    clip-path: polygon(0% 0%, 0% 100%, 100% 100%, 100% 0%, 0% 0%, 
                        var(--hole-left) var(--hole-top), 
                        var(--hole-right) var(--hole-top), 
                        var(--hole-right) var(--hole-bottom), 
                        var(--hole-left) var(--hole-bottom), 
                        var(--hole-left) var(--hole-top));
                    transition: clip-path 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                }

                .tour-step-card {
                    position: fixed;
                    background: linear-gradient(135deg, #1a1a1c 0%, #0c0c0e 100%);
                    width: 320px;
                    border-radius: 24px;
                    padding: 25px;
                    border: 1px solid var(--accent);
                    text-align: center;
                    box-shadow: 0 20px 50px rgba(0,0,0,1), 0 0 20px rgba(229, 9, 20, 0.2);
                    pointer-events: auto;
                    z-index: 60001;
                    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                    opacity: 0;
                    transform: translateY(20px);
                }

                .tour-step-card.active {
                    opacity: 1;
                    transform: translateY(0);
                }

                .tour-step-card::after {
                    content: '';
                    position: absolute;
                    width: 15px;
                    height: 15px;
                    background: #1a1a1c;
                    border-left: 1px solid var(--accent);
                    border-top: 1px solid var(--accent);
                    transform: rotate(45deg);
                    display: none; /* Dynamically shown based on position */
                }

                .tour-icon {
                    width: 50px;
                    height: 50px;
                    background: rgba(229, 9, 20, 0.1);
                    border-radius: 12px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    margin: 0 auto 15px;
                    color: var(--accent);
                    font-size: 20px;
                }

                .tour-footer {
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    margin-top: 20px;
                    gap: 15px;
                }

                .tour-skip {
                    color: var(--text-muted);
                    font-size: 13px;
                    cursor: pointer;
                    text-decoration: underline;
                }

                @keyframes pulse-ring {
                    0% { transform: scale(0.8); opacity: 0.5; }
                    100% { transform: scale(1.5); opacity: 0; }
                }

                .spotlight-ring {
                    position: fixed;
                    border: 2px solid var(--accent);
                    border-radius: 12px;
                    pointer-events: none;
                    z-index: 60000;
                    display: none;
                    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                }

                .spotlight-ring::before {
                    content: '';
                    position: absolute;
                    inset: -10px;
                    border: 2px solid var(--accent);
                    border-radius: inherit;
                    animation: pulse-ring 1.5s infinite;
                }
            </style>

            <!-- Hero Section -->

                .trending-info {

                .trending-title {

            </style>

            <section>
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%; flex-wrap: wrap; gap: 15px;">
                        <h2 style="font-size: 24px; font-weight: 800;" data-t="explore_more">استكشف المزيد</h2>
                        
                        <a href="explore.html" class="btn btn-outline" style="padding: 10px 20px; font-size: 13px; border-radius: 100px; display: flex; align-items: center; gap: 8px; text-decoration: none; color: white;">
                            <span data-t="view_all">مشاهدة الكل</span>

            </style>
        </main>

        <!-- Welcome Gift Modal -->
        <div id="gift-modal"
            style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px;">
            <div
                style="background: linear-gradient(135deg, #161618 0%, #0c0c0e 100%); width: 100%; max-width: 400px; border-radius: 40px; padding: 50px 40px; border: 1px solid rgba(229, 9, 20, 0.2); text-align: center; position: relative; overflow: hidden; animation: giftPop 0.6s cubic-bezier(0.2, 0.8, 0.2, 1.2);">

                    style="position: absolute; top: -50px; left: -50px; width: 150px; height: 150px; background: var(--accent); filter: blur(80px); opacity: 0.3;">
                </div>

                <div
                    style="width: 100px; height: 100px; background: rgba(229, 9, 20, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; color: var(--accent); font-size: 45px; box-shadow: 0 0 30px rgba(229, 9, 20, 0.2);">
                    <i class="fa-solid fa-gift"></i>
                </div>

                <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 15px; color: white;">هدية ترحيبية!</h2>
                <p style="color: var(--text-muted); font-size: 16px; margin-bottom: 35px; line-height: 1.6;">شكراً

                <div
                    style="background: rgba(255,255,255,0.03); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 40px; transform: scale(1.1);">
                    <h3
                        style="font-size: 42px; font-weight: 900; color: #fbbf24; text-shadow: 0 0 20px rgba(251, 191, 36, 0.3);">

                </div>

                <button onclick="closeGiftModal()" class="btn btn-accent"
                    style="width: 100%; justify-content: center; padding: 18px; font-size: 18px; font-weight: 800; border-radius: 20px;">استلام
                    الجائزة</button>
            </div>
        </div>

        <!-- Search Overlay -->
        <div id="search-overlay" class="search-overlay">
            <div class="search-header">
                <div class="search-input-container">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="main-search-input" data-t-placeholder="search_placeholder" placeholder="ابحث عن مسلسلك المفضل..." oninput="filterSeries(this.value)">
                </div>
                <button class="close-search" onclick="closeSearch()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="search-results-grid" class="search-results series-grid">
                <!-- Search results go here -->
            </div>
        </div>

        <!-- Onboarding Spotlight Tour -->
        <div id="tour-mask" class="tour-mask"></div>
        <div id="spotlight-ring" class="spotlight-ring"></div>
        
        <div id="tour-overlay" class="tour-overlay">
            <div id="tour-card" class="tour-step-card">
                <div id="tour-icon" class="tour-icon"></div>
                <h2 id="tour-title" style="font-size: 18px; font-weight: 800; margin-bottom: 10px; color: white;"></h2>
                <p id="tour-desc" style="color: var(--text-muted); font-size: 14px; line-height: 1.5; margin-bottom: 0;"></p>
                
                <div class="tour-footer">
                    <span class="tour-skip" onclick="endTour()">تخطي الجولة</span>
                    <button id="tour-next-btn" onclick="nextTourStep()" class="btn btn-accent" style="padding: 8px 20px; border-radius: 10px; font-size: 14px;">التالي</button>
                </div>
            </div>
        </div>

    </div>

    <style>
        @keyframes giftPop {
            0% {
                opacity: 0;
                transform: scale(0.5) rotate(-10deg);
            }

            70% {
                transform: scale(1.05) rotate(2deg);
            }

                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }
    </style>
    <script src="shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Initial Data Fetch (Non-blocking for UI as much as possible)
            const getInitialData = async () => {
                try {
                    const series = (await getSeries()).sort((a, b) => b.id - a.id);
                    renderHomeContent(series);
                    
                    // Welcome Gift Check (Run in background after render)
                    checkWelcomeGift().then(hasGift => {
                        if (hasGift) document.getElementById('gift-modal').style.display = 'flex';
                    });

                    // Check for Onboarding
                    checkOnboarding();
                } catch (e) {
                    console.error("Home Init Error:", e);
                }
            };

            // Update Header Profile Link
            const headerLink = document.getElementById('header-profile-link');
            if (isLoggedIn()) {
                headerLink.href = 'profile.html';
            }

            getInitialData();
        });

        async function renderHomeContent(series) {
            const featured = series.slice(0, 5); // Take top 5 newest for featured
            const slider = document.getElementById('hero-slider');
            const sideList = document.getElementById('side-list');

            if (!slider || !sideList) return;
            slider.innerHTML = '';
            sideList.innerHTML = '';

            const lang = getCurrentLang();
            const t = translations[lang];

            featured.forEach((s, i) => {
                // Render Slide
                const slide = document.createElement('div');
                slide.className = `hero-slide ${i === 0 ? 'active' : ''}`;
                const isFav = isFavorite(s.id);
                slide.innerHTML = `
                    <img src="${s.poster_url || s.poster}" class="hero-img">
                    <div class="hero-content">
                        <span style="background: var(--accent); color: white; padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 800; margin-bottom: 15px; width: fit-content;" data-t="trending">${t['trending']}</span>
                        <h1 style="font-size: 42px; font-weight: 900; line-height: 1.1; margin-bottom: 20px;">${s.title}</h1>
                        <div style="display: flex; gap: 15px;">
                            <a href="series.html?id=${s.id}" class="btn btn-accent" data-t="watch_now">${t['watch_now']}</a>
                            <button class="btn btn-outline" onclick="toggleFavorite('${s.id}', this)">
                                <i class="fa-solid fa-bookmark" style="color: ${isFav ? 'var(--accent)' : 'white'}"></i>
                                <span data-t="${isFav ? 'saved' : 'save'}">${isFav ? t['saved'] : t['save']}</span>
                            </button>
                        </div>
                    </div>
                `;
                slider.appendChild(slide);

                // Render Side Card
                const sideItem = document.createElement('div');
                sideItem.className = `side-item ${i === 0 ? 'active' : ''}`;
                sideItem.id = `side-item-${i}`;
                sideItem.innerHTML = `
                    <div class="side-item-content">
                        <img src="${s.poster_url || s.poster}" class="side-thumb">
                        <div class="side-info">
                            <h4>${s.title}</h4>
                            <span>${s.category_name || s.category}</span>
                        </div>
                    </div>
                    <div class="side-progress-container">
                        <div class="side-progress-bar" id="bar-${i}"></div>
                    </div>
                `;
                sideItem.onclick = () => goToSlide(i);
                sideList.appendChild(sideItem);
            });

            // Sync Logic
            let currentIdx = 0;
            const slides = document.querySelectorAll('.hero-slide');
            const sideItems = document.querySelectorAll('.side-item');
            const duration = 5000;
            let progress = 0;

            if (slides.length > 0) {
                function updateSlider() {
                    progress += (100 / (duration / 20));
                    const activeBar = document.getElementById(`bar-${currentIdx}`);
                    if (activeBar) activeBar.style.width = progress + '%';

                    if (progress >= 100) {
                        progress = 0;
                        if (activeBar) activeBar.style.width = '0%';

                        if (slides[currentIdx]) slides[currentIdx].classList.remove('active');
                        if (sideItems[currentIdx]) sideItems[currentIdx].classList.remove('active');

                        currentIdx = (currentIdx + 1) % slides.length;

                        if (slides[currentIdx]) slides[currentIdx].classList.add('active');
                        if (sideItems[currentIdx]) sideItems[currentIdx].classList.add('active');
                    }
                }

                function goToSlide(idx) {
                    progress = 0;
                    document.querySelectorAll('.side-progress-bar').forEach(b => b.style.width = '0%');
                    if (slides[currentIdx]) slides[currentIdx].classList.remove('active');
                    if (sideItems[currentIdx]) sideItems[currentIdx].classList.remove('active');
                    currentIdx = idx;
                    if (slides[currentIdx]) slides[currentIdx].classList.add('active');
                    if (sideItems[currentIdx]) sideItems[currentIdx].classList.add('active');
                }

                setInterval(updateSlider, 20);
                window.goToSlide = goToSlide; 
            }

            // Trending Scroll
            const trendingSeries = series.slice().sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 10);
            const trendingScroll = document.getElementById('trending-scroll');
            if (trendingScroll) {
                trendingScroll.innerHTML = trendingSeries.map((s, idx) => `
                    <a href="series.html?id=${s.id}" class="trending-item">
                        <div class="rank-number">${idx + 1}</div>
                        <img src="${s.poster_url || s.poster}" class="trending-poster" alt="${s.title}">
                        <div class="trending-info">
                            <div class="trending-title">${s.title}</div>
                            <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">${s.category_name || s.category}</div>
                        </div>
                    </a>
                `).join('');
            }

            // Main Grid
            const favIds = await getFavs();
            window._favIds = favIds.map(f => String(f)); 
            renderMainGrid(series.slice(0, 10));

            // Load Categories
            const homeCats = document.getElementById('home-categories');
            if (homeCats) {
                const categories = await getCategories();
                // Clear existing except "All"
                const allTag = homeCats.querySelector('.cat-tag.active');
                homeCats.innerHTML = '';
                if (allTag) homeCats.appendChild(allTag);

                categories.forEach(cat => {
                    const name = typeof cat === 'string' ? cat : cat.name;
                    if (!name) return;
                    const tag = document.createElement('div');
                    tag.className = 'cat-tag';
                    tag.innerText = name;
                    tag.onclick = () => filterHomeGrid(name, tag);
                    homeCats.appendChild(tag);
                });
            }
        }

        async function handleSearch(query) {
            const q = query.toLowerCase().trim();
            const series = await getSeries();
            const filtered = series.filter(s => 
                (s.title || '').toLowerCase().includes(q) || 
                (s.category_name || s.category || '').toLowerCase().includes(q)
            );
            renderSearchResults(filtered);
            if (q === '') renderMainGrid(series);
        }

        // Called by oninput on main-search-input
        function filterSeries(query) {
            handleSearch(query);
        }

        async function openSearch() {
            const overlay = document.getElementById('search-overlay');
            overlay.classList.add('active');
            const input = document.getElementById('main-search-input');
            if (input) setTimeout(() => input.focus(), 100);
            renderSearchResults(await getSeries());
        }

        function closeSearch() {
            document.getElementById('search-overlay').classList.remove('active');
        }

        function renderSearchResults(data) {
            const grid = document.getElementById('search-results-grid');
            if (grid) {
                const noResultsMsg = getCurrentLang() === 'ar' ? 'لا توجد نتائج تطابق بحثك...' : 'No results found...';
                const favIds = window._favIds || [];
                grid.innerHTML = data.length > 0 
                    ? data.map(s => createCard(s, favIds.includes(String(s.id)))).join('') 
                    : `<div style="color: white; grid-column: 1/-1; text-align: center; padding: 50px; opacity: 0.5;">${noResultsMsg}</div>`;
            }
        }

        function renderMainGrid(data) {
            const grid = document.getElementById('main-grid');
            const favIds = window._favIds || [];
            
            // Dynamic height locking to prevent jump
            const currentHeight = grid.offsetHeight;
            if (currentHeight > 0) grid.style.minHeight = currentHeight + 'px';
            
            grid.innerHTML = data.map(s => createCard(s, favIds.includes(String(s.id)))).join('');
            
            // Reset min-height after content is in
            setTimeout(() => {
                grid.style.minHeight = '0px';
            }, 50);
        }


        async function filterHomeGrid(category, element) {
            document.querySelectorAll('#home-categories .cat-tag').forEach(t => t.classList.remove('active'));
            element.classList.add('active');

            const [series, favIds] = await Promise.all([getSeries(), getFavs()]);
            window._favIds = favIds.map(f => String(f));
            if (category === 'All' || !category) {
                renderMainGrid(series);
            } else {
                const filtered = series.filter(s => (s.category_name || s.category) === category);
                renderMainGrid(filtered);
            }
        }

        function closeGiftModal() {
            document.getElementById('gift-modal').style.display = 'none';
        }

        // Onboarding Spotlight Tour Logic
        let currentTourStep = 0;
        const tourSteps = [
            {
                title: "أهلاً بك في ريل عرب! 🎬",
                desc: "وجهتك الأولى لأجمل المسلسلات العربية والدراما الحصرية بجودة عالية.",
                icon: "fa-solid fa-clapperboard",
                target: null // Center of screen
            },
            {
                title: "بحث ذكي وسريع 🔍",
                desc: "اضغط هنا لتجد مسلسلك المفضل بالاسم أو التصنيف بلحظات.",
                icon: "fa-solid fa-magnifying-glass",
                target: "search-btn"
            },
            {
                title: "عالم الريلز الممتع 📱",
                desc: "استكشف أجمل المقاطع القصيرة والمشاهد الحماسية من هنا.",
                icon: "fa-solid fa-play",
                target: "reels-nav"
            },
            {
                title: "نقاطك هي مفتاحك 💎",
                desc: "اجمع النقاط واستخدمها لفتح حلقات حصرية ومميزة مجاناً.",
                icon: "fa-solid fa-gem",
                target: "header-profile-link"
            }
        ];

        async function checkOnboarding() {
            const user = getCurrentUser();
            if (!user) return; 

            // Check local storage first for speed
            if (localStorage.getItem(`reelar_tour_completed_${user.id}`)) return;

            // Then check cloud profile to be 100% sure
            const profile = await getUserProfile(true);
            if (profile && profile.tour_completed) {
                localStorage.setItem(`reelar_tour_completed_${user.id}`, 'true');
                return;
            }

            setTimeout(startTour, 1500);
        }

        function startTour() {
            currentTourStep = 0;
            document.getElementById('tour-overlay').style.display = 'block';
            document.getElementById('tour-mask').style.display = 'block';
            updateTourStep();
        }

        function updateTourStep() {
            const step = tourSteps[currentTourStep];
            const card = document.getElementById('tour-card');
            const mask = document.getElementById('tour-mask');
            const ring = document.getElementById('spotlight-ring');
            
            // Update Content
            const lang = getCurrentLang();
            const translationsObj = translations[lang];
            
            document.getElementById('tour-title').innerText = translationsObj[step.title] || step.title;
            document.getElementById('tour-desc').innerText = translationsObj[step.desc] || step.desc;
            document.getElementById('tour-next-btn').innerText = currentTourStep === tourSteps.length - 1 ? (translationsObj['finish'] || "ابدأ الآن") : (translationsObj['next'] || "التالي");

            card.classList.remove('active');

            if (step.target) {
                const el = document.getElementById(step.target);
                if (el) {
                    const rect = el.getBoundingClientRect();
                    const padding = 10;
                    
                    // Update Mask Hole
                    mask.style.setProperty('--hole-left', (rect.left - padding) + 'px');
                    mask.style.setProperty('--hole-top', (rect.top - padding) + 'px');
                    mask.style.setProperty('--hole-right', (rect.right + padding) + 'px');
                    mask.style.setProperty('--hole-bottom', (rect.bottom + padding) + 'px');

                    // Update Ring
                    ring.style.display = 'block';
                    ring.style.left = (rect.left - padding) + 'px';
                    ring.style.top = (rect.top - padding) + 'px';
                    ring.style.width = (rect.width + padding * 2) + 'px';
                    ring.style.height = (rect.height + padding * 2) + 'px';

                    // Position Card
                    setTimeout(() => {
                        let cardTop, cardLeft;
                        
                        // Default horizontal center
                        cardLeft = rect.left + (rect.width / 2) - 160;
                        if (cardLeft < 20) cardLeft = 20;
                        if (cardLeft + 320 > window.innerWidth) cardLeft = window.innerWidth - 340;

                        if (rect.top > 350) {
                            cardTop = rect.top - 250;
                        } else {
                            cardTop = rect.bottom + 40;
                        }

                        card.style.left = cardLeft + 'px';
                        card.style.top = cardTop + 'px';
                        card.classList.add('active');
                    }, 100);
                }
            } else {
                // Center Step (no target element)
                mask.style.setProperty('--hole-left', '50%');
                mask.style.setProperty('--hole-top', '50%');
                mask.style.setProperty('--hole-right', '50%');
                mask.style.setProperty('--hole-bottom', '50%');
                ring.style.display = 'none';

                // Calculate center using pixels to avoid transform override conflicts
                card.style.left = (window.innerWidth / 2 - 160) + 'px';
                card.style.top = (window.innerHeight / 2 - 120) + 'px';
                
                setTimeout(() => card.classList.add('active'), 100);
            }
        }

        function nextTourStep() {
            if (currentTourStep < tourSteps.length - 1) {
                currentTourStep++;
                updateTourStep();
            } else {
                endTour();
            }
        }

        async function endTour() {
            document.getElementById('tour-overlay').style.display = 'none';
            document.getElementById('tour-mask').style.display = 'none';
            document.getElementById('spotlight-ring').style.display = 'none';
            
            const user = getCurrentUser();
            if (user) {
                localStorage.setItem(`reelar_tour_completed_${user.id}`, 'true');
                await updateProfile({ tour_completed: true });
                
                // Show gift if not already claimed
                const profile = await getUserProfile(true);
                if (profile && !profile.gift_claimed) {
                    document.getElementById('gift-modal').style.display = 'flex';
                }
            }
        }

        // Re-align on resize
        window.addEventListener('resize', () => {
            if (document.getElementById('tour-mask').style.display === 'block') {
                updateTourStep();
            }
        });
        // --- Logout Modal HTML ---
        document.body.insertAdjacentHTML('beforeend', `
            <div id="logout-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 99999; display: none; align-items: center; justify-content: center; padding: 20px;">
                <div style="background: #161618; width: 100%; max-width: 380px; border-radius: 25px; padding: 35px; border: 1px solid rgba(255,255,255,0.08); text-align: center;">
                    <div style="width: 70px; height: 70px; background: rgba(239, 68, 68, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: #ef4444; font-size: 30px;">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </div>
                    <h3 style="font-size: 22px; margin-bottom: 10px;">تسجيل الخروج</h3>
                    <p style="color: var(--text-muted); font-size: 15px; margin-bottom: 30px; line-height: 1.6;">هل أنت متأكد أنك تريد تسجيل الخروج من حسابك؟</p>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <button onclick="logout()" class="btn btn-accent" style="background: #ef4444; border-color: #ef4444; justify-content: center;">نعم، خروج</button>
                        <button onclick="closeLogoutModal()" class="btn btn-outline" style="justify-content: center;">إلغاء</button>
                    </div>
                </div>
            </div>
        `);

        function openLogoutModal() { document.getElementById('logout-modal').style.display = 'flex'; }
        function closeLogoutModal() { document.getElementById('logout-modal').style.display = 'none'; }
    </script>
</body>

</html>
