<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetShort | سجل المشاهدة</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    
</head>

<body>
    <div class="app-container">
        <nav class="bottom-nav">
            <div class="nav-logo">
                <h1
                    style="color: var(--accent); font-size: 35px; font-weight: 800; letter-spacing: -1px; text-shadow: 0 0 15px var(--accent-glow);">
                    Reel<span style="color: white;">Arab</span></h1>
            </div>
            <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>الرئيسية</span></a>
            <a href="explore.html" class="nav-item"><i class="fa-solid fa-compass"></i><span>اكتشف</span></a>
            <a href="reels.html" class="nav-item nav-item-reels"><i class="fa-solid fa-clapperboard"></i><span>ريلز</span></a>
            <a href="favorites.html" class="nav-item"><i class="fa-solid fa-bookmark"></i><span>قائمتي</span></a>
            <a href="profile.html" class="nav-item active"><i class="fa-solid fa-circle-user"></i><span>ملفي</span></a>
        </nav>

        <main style="flex: 1; padding: 40px 20px; max-width: 1200px; margin: 0 auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding: 0 10px;">
                <h1 style="font-size: 32px; font-weight: 900;">سجل <span style="color: var(--accent);">المشاهدة</span></h1>
                <div style="background: rgba(255,255,255,0.03); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--border); font-size: 13px; color: var(--text-muted);">
                    <span id="fav-count">0</span> مسلسلات
                </div>
            </div>
            
            <div id="favorites-grid" class="series-grid" style="gap: 20px;"></div>
            
            <div id="fav-empty" style="text-align: center; padding: 120px 20px; display: none; background: rgba(255,255,255,0.02); border-radius: 30px; border: 1px dashed var(--border);">
                <div style="width: 80px; height: 80px; background: rgba(255,255,255,0.03); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;">
                    <i class="fa-solid fa-clock-rotate-left" style="font-size: 32px; opacity: 0.3;"></i>
                </div>
                <h3 style="font-size: 20px; margin-bottom: 10px;">سجل المشاهدة خالي</h3>
                <p style="color: var(--text-muted); margin-bottom: 30px;">ابدأ بمشاهدة المسلسلات لتظهر هنا.</p>
                <a href="index.html" class="btn btn-accent">تصفح المسلسلات</a>
            </div>
        </main>
    </div>

    <script src="shared.js"></script>
    <script>
        function getUnlockedEpisodes(seriesId) {
            const user = getCurrentUser();
            const prefix = user ? user.email : 'visitor';
            const specificKey = `reelar_unlocked_eps_${seriesId}_${prefix}`;
            
            const unlockedStr = localStorage.getItem(specificKey);
            if (unlockedStr) {
                return JSON.parse(unlockedStr);
            }
            
            if (user && user.email === 'admin@reelar.com') {
                const oldStr = localStorage.getItem(`reelar_unlocked_eps_${seriesId}`);
                if (oldStr) {
                    localStorage.setItem(specificKey, oldStr);
                    return JSON.parse(oldStr);
                }
                
                const progress = parseInt(localStorage.getItem(`reelar_progress_${seriesId}`) || '0');
                if (progress > 0) {
                    const arr = Array.from({length: progress + 1}, (_, i) => i);
                    localStorage.setItem(specificKey, JSON.stringify(arr));
                    return arr;
                }
            }
            return [];
        }

        function createWatchedCard(series) {
            const unlocked = getUnlockedEpisodes(series.id);
            const maxEpIndex = unlocked.length > 0 ? Math.max(...unlocked) : 0;
            const reachedEp = maxEpIndex + 1;

            const poster = getSeriesPosterUrl(series);
            const category = series.category_name || series.category || 'عام';
            const title = series.title || 'بدون عنوان';
            const isMovie = series.type === 'movie' || series.episodes_count === 1;
            const isYouTube = poster && poster.includes('img.youtube.com');
            
            const totalEps = series.episodes_count > 0 ? series.episodes_count : (isMovie ? 1 : Math.max(reachedEp, 1));
            let pct = Math.min(100, Math.round((reachedEp / totalEps) * 100));
            
            // For movies, we don't track seconds watched yet, so we just show a semi-full bar to indicate "In Progress"
            if (isMovie) pct = 50;

            return `
                <a href="series.html?id=${series.id}&ep=${reachedEp}" class="series-card" style="text-decoration: none;">
                    <div class="card-img-wrapper" style="position: relative;">
                        ${isYouTube ? `<img src="${poster}" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: blur(15px) brightness(0.6); transform: scale(1.1);">` : ''}
                        <img src="${poster}" alt="${title}" loading="lazy" style="${isYouTube ? 'object-fit: contain; position: relative; z-index: 1; width: 100%; height: 100%;' : ''}">
                        <div class="category-badge" style="z-index: 2;">${category}</div>
                        
                        <!-- Watch Progress Overlay -->
                        <div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%); padding: 30px 10px 10px; display: flex; flex-direction: column; justify-content: flex-end; z-index: 5;">
                            <div style="background: rgba(229,9,20,0.95); color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; display: inline-flex; align-items: center; gap: 5px; box-shadow: 0 2px 10px rgba(229,9,20,0.4); width: fit-content; margin-bottom: 8px;">
                                <i class="fa-solid fa-play"></i> ${isMovie ? 'متابعة الفيلم' : `واصل الحلقة ${reachedEp}`}
                            </div>
                            <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; display: block;">
                                <div style="width: ${pct}%; height: 100%; background: ${isMovie ? 'linear-gradient(90deg, var(--accent) 0%, #fbbf24 100%)' : 'var(--accent)'}; border-radius: 2px;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="card-info">
                        <h4>${title}</h4>
                        <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">${isMovie ? 'فيلم' : `${totalEps} حلقات`}</div>
                    </div>
                </a>
            `;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const profile = await getUserProfile();
            const watchedIds = profile ? (profile.watched_ids || []) : [];
            
            const allSeries = await getSeries();
            const watched = watchedIds.slice().reverse().map(id => allSeries.find(item => String(item.id) === String(id))).filter(s => s);
            
            const grid = document.getElementById('favorites-grid');
            const empty = document.getElementById('fav-empty');
            const countEl = document.getElementById('fav-count');
            
            if(countEl) countEl.innerText = watched.length;

            if (watched.length === 0) {
                empty.style.display = 'block';
            } else {
                grid.innerHTML = watched.map(s => createWatchedCard(s)).join('');
            }
        });
    </script>
</body>

</html>
