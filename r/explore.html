<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>ReelArab | استكشاف التصنيفات</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    
    <style>
        .search-section {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(12, 12, 14, 0.8);
            backdrop-filter: blur(20px);
            padding: 25px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.03);
            padding: 18px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 800px;
            margin: 0 auto;
        }

        .search-bar:focus-within {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.15);
            transform: scale(1.02);
        }

        .search-bar input {
            background: none;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            font-size: 17px;
            font-weight: 500;
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .category-section {
            margin-bottom: 50px;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .category-header h2 {
            font-size: 24px;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .category-header h2::before {
            content: '';
            width: 5px;
            height: 25px;
            background: var(--accent);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--accent);
        }

        .view-all {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            padding: 6px 15px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .view-all:hover {
            color: white;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Category Slider (Horizontal Scroll) for all devices */
        .category-slider.series-grid {
            display: flex !important;
            gap: 20px !important;
            overflow-x: auto !important;
            padding: 10px 0 30px !important;
            margin: 0 !important;
            scrollbar-width: none !important;
            -webkit-overflow-scrolling: touch !important;
            flex-wrap: nowrap !important;
            align-items: flex-start !important;
            scroll-snap-type: x mandatory !important;
            padding: 10px 0 30px !important;
        }

        .category-slider::-webkit-scrollbar {
            height: 4px;
        }
        
        .category-slider::after {
            content: '';
            flex: 0 0 80px; /* Strong spacer at the end */
            height: 1px;
        }
        .category-slider::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .category-slider::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .category-slider .series-card {
            flex: 0 0 180px !important; /* Default desktop size */
            min-width: 180px !important;
            max-width: 180px !important;
            transition: transform 0.3s ease;
            scroll-snap-align: start !important;
        }

        .category-slider .series-card:hover {
            transform: translateY(-10px);
        }

        .category-slider .card-img-wrapper {
            aspect-ratio: 2/3 !important;
        }

        /* Slider Navigation Arrows */
        .category-section {
            position: relative;
        }

        .slider-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            opacity: 0;
            backdrop-filter: blur(5px);
        }

        .slider-container:hover .slider-arrow {
            opacity: 1;
        }

        .slider-arrow:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
        }

        .slider-arrow.prev { right: -20px; }
        .slider-arrow.next { left: -20px; }

        @media (max-width: 1024px) {
            .slider-arrow { display: none; } /* Hide arrows on touch devices */
        }

        @media (max-width: 768px) {
            .category-slider.series-grid {
                gap: 12px !important;
                padding: 10px 20px 25px !important;
                margin: 0 -20px !important; /* Bleed to edges on mobile only */
            }
            .category-slider .series-card {
                flex: 0 0 115px !important;
                min-width: 115px !important;
                max-width: 115px !important;
            }
            .category-slider .card-info h4 {
                font-size: 11px !important;
                margin-top: 8px !important;
                white-space: normal !important;
            }
        }

        @media (min-width: 1024px) {
            main {
                padding: 40px 80px !important;
            }
        }

        /* PC-only Logout styles */
        @media (max-width: 768px) {
            .nav-item-logout-pc { display: none !important; }
        }
        @media (min-width: 769px) {
            .nav-item-logout-pc { margin-top: auto; color: #ef4444 !important; }
            .nav-item-logout-pc:hover { background: rgba(239, 68, 68, 0.1) !important; }
        }

        .filter-pills {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
            overflow-x: auto;
            padding: 10px 5px;
            scrollbar-width: none;
            justify-content: center;
        }
        .filter-pills::-webkit-scrollbar { display: none; }

        .filter-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-muted);
            padding: 12px 28px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .filter-pill::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: 0.4s;
        }

        .filter-pill:hover {
            color: white;
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .filter-pill.active {
            background: linear-gradient(135deg, var(--accent), #b91c1c);
            color: white;
            border-color: transparent;
            box-shadow: 0 10px 25px rgba(229, 9, 20, 0.4), 
                        inset 0 2px 5px rgba(255,255,255,0.3);
            transform: translateY(-2px) scale(1.05);
        }

        .filter-pill.active i {
            color: white;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }

        .filter-pill i { 
            font-size: 14px; 
            transition: 0.3s;
        }

        .filter-pill:active {
            transform: scale(0.95);
        }

        /* Pagination Styles */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 50px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .page-btn {
            min-width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            font-size: 15px;
        }

        .page-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3);
        }

        .page-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .page-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <nav class="bottom-nav">
            <div class="nav-logo">
                <h1 style="color: var(--accent); font-size: 35px; font-weight: 800; letter-spacing: -1px;">Reel<span
                        style="color: white;">Arab</span></h1>
            </div>
            <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span data-t="home">الرئيسية</span></a>
            <a href="explore.html" class="nav-item active"><i class="fa-solid fa-compass"></i><span data-t="explore">اكتشف</span></a>
            <a href="reels.html" class="nav-item nav-item-reels"><i class="fa-solid fa-clapperboard"></i><span data-t="reels">ريلز</span></a>
            <a href="favorites.html" class="nav-item"><i class="fa-solid fa-bookmark"></i><span data-t="favorites">قائمتي</span></a>
            <a href="profile.html" class="nav-item"><i class="fa-solid fa-circle-user"></i><span data-t="profile">ملفي</span></a>
            <a href="#" class="nav-item nav-item-logout-pc" onclick="openLogoutModal()"><i class="fa-solid fa-right-from-bracket"></i><span data-t="logout">خروج</span></a>
        </nav>

        <main style="flex: 1; padding: 20px; min-width: 0; overflow: hidden;">
            <div class="search-section">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-input" data-t-placeholder="search_placeholder" placeholder="ابحث عن اسم المسلسل أو التصنيف..." oninput="handleSearch(this.value)">
                </div>
            </div>

            <div class="filter-pills">
                <button class="filter-pill active" onclick="filterByType('all', this)"><i class="fa-solid fa-border-all"></i> <span data-t="all">الكل</span></button>
                <button class="filter-pill" onclick="filterByType('series', this)"><i class="fa-solid fa-list"></i> <span data-t="series">مسلسلات</span></button>
                <button class="filter-pill" onclick="filterByType('movie', this)"><i class="fa-solid fa-film"></i> <span data-t="movies">أفلام سينمائية</span></button>
            </div>

            <div class="results-info">
                <h2 data-t="explore">اكتشف</h2>
            </div>

            <div id="explore-content">
                <!-- Categorized Sections will load here -->
            </div>
        </main>
    </div>

    <script src="shared.js"></script>
    <script>
        let currentFilterType = 'all';

        let exploreCategories = [];
        let categoriesRendered = 0;
        const categoriesPerPage = 5;
        let isRenderLoading = false;
        let currentFavIds = [];

        async function renderCategorizedExplore() {
            const lang = getCurrentLang();
            const [series, favIds] = await Promise.all([getSeries(), getFavs()]);
            currentFavIds = favIds.map(f => String(f));
            
            let filteredSource = series;
            if (currentFilterType !== 'all') {
                filteredSource = series.filter(s => (s.type || 'series') === currentFilterType);
            }

            const sortedSeries = filteredSource.sort((a, b) => b.id - a.id);
            const categoryMap = {};
            sortedSeries.forEach(s => {
                const cat = s.category_name || s.category || (lang === 'ar' ? 'متنوع' : 'General');
                if (!categoryMap[cat]) categoryMap[cat] = [];
                categoryMap[cat].push(s);
            });

            exploreCategories = Object.entries(categoryMap).sort((a, b) => b[1].length - a[1].length);
            categoriesRendered = 0;
            document.getElementById('explore-content').innerHTML = '';
            
            if (exploreCategories.length === 0) {
                document.getElementById('explore-content').innerHTML = `<p style="padding: 50px; text-align: center; opacity: 0.5;">${lang === 'ar' ? 'لا يوجد محتوى متوفر لهذا الفلتر...' : 'No content available for this filter...'}</p>`;
                return;
            }

            loadNextCategories();
        }

        function loadNextCategories() {
            if (isRenderLoading || categoriesRendered >= exploreCategories.length) return;
            
            // Check if we are already in "filtered by category" or "search" mode
            const content = document.getElementById('explore-content');
            if (content.querySelector('.pagination') || document.getElementById('search-input').value.trim() !== '') return;

            isRenderLoading = true;
            const lang = getCurrentLang();
            const t = translations[lang];
            const nextBatch = exploreCategories.slice(categoriesRendered, categoriesRendered + categoriesPerPage);
            
            nextBatch.forEach(([cat, catSeries]) => {
                if (catSeries.length > 0) {
                    const sliced = catSeries.slice(0, 15);
                    const hasMore = catSeries.length > 15;
                    let cardsHtml = sliced.map(s => createCard(s, currentFavIds.includes(String(s.id)))).join('');
                    
                    if (hasMore) {
                        cardsHtml += `
                            <div class="series-card show-more-card" onclick="filterByCategory('${cat}')" 
                                style="display: flex !important; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); border: 2px dashed rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; aspect-ratio: 2/3; gap: 10px; transition: 0.3s; height: auto !important;">
                                <div style="width: 48px; height: 48px; border-radius: 50%; background: rgba(229, 9, 20, 0.1); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 18px;">
                                    <i class="fa-solid fa-plus"></i>
                                </div>
                                <div style="text-align: center;">
                                    <p style="font-weight: 800; color: white; font-size: 14px; margin-bottom: 2px;">إظهار الكل</p>
                                    <p style="font-size: 11px; color: var(--text-muted);">+${catSeries.length - 15} محتوى</p>
                                </div>
                            </div>
                        `;
                    }

                    const section = document.createElement('div');
                    section.className = 'category-section';
                    section.innerHTML = `
                        <div class="category-header">
                            <h2>${cat}</h2>
                            <a href="javascript:void(0)" onclick="filterByCategory('${cat}')" class="view-all">${t['view_all'] || 'عرض الكل'}</a>
                        </div>
                        <div class="slider-container">
                            <button class="slider-arrow prev" onclick="scrollSlider(this, 1)"><i class="fa-solid fa-chevron-right"></i></button>
                            <div class="category-slider series-grid">
                                ${cardsHtml}
                            </div>
                            <button class="slider-arrow next" onclick="scrollSlider(this, -1)"><i class="fa-solid fa-chevron-left"></i></button>
                        </div>
                    `;
                    content.appendChild(section);
                }
            });

            categoriesRendered += nextBatch.length;
            isRenderLoading = false;
        }

        // Infinite Scroll Listener
        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                loadNextCategories();
            }
        });

        window.filterByType = (type, btn) => {
            currentFilterType = type;
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            
            // If we are in a search or category view, just reset to categorized explore with the new filter
            document.getElementById('search-input').value = '';
            renderCategorizedExplore();
        };

        async function filterByCategory(cat, page = 1) {
            const lang = getCurrentLang();
            const t = translations[lang];
            const itemsPerPage = 32;

            const [series, favIds] = await Promise.all([getSeries(), getFavs()]);
            let filtered = series.sort((a, b) => b.id - a.id).filter(s => (s.category_name || s.category) === cat);
            
            if (currentFilterType !== 'all') {
                filtered = filtered.filter(s => (s.type || 'series') === currentFilterType);
            }

            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            const startIndex = (page - 1) * itemsPerPage;
            const paginatedItems = filtered.slice(startIndex, startIndex + itemsPerPage);
            
            const content = document.getElementById('explore-content');
            const favIdsStr = favIds.map(f => String(f));

            let paginationHtml = '';
            if (totalPages > 1) {
                paginationHtml = `<div class="pagination">`;
                // Prev Btn
                paginationHtml += `<button class="page-btn ${page === 1 ? 'disabled' : ''}" onclick="filterByCategory('${cat}', ${page - 1})"><i class="fa-solid fa-chevron-right"></i></button>`;
                
                for (let i = 1; i <= totalPages; i++) {
                    // Show dots if too many pages? For now just show all if small, or simple logic
                    if (totalPages <= 7 || i === 1 || i === totalPages || (i >= page - 1 && i <= page + 1)) {
                        paginationHtml += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="filterByCategory('${cat}', ${i})">${i}</button>`;
                    } else if (i === page - 2 || i === page + 2) {
                        paginationHtml += `<span style="color:rgba(255,255,255,0.2);">...</span>`;
                    }
                }

                // Next Btn
                paginationHtml += `<button class="page-btn ${page === totalPages ? 'disabled' : ''}" onclick="filterByCategory('${cat}', ${page + 1})"><i class="fa-solid fa-chevron-left"></i></button>`;
                paginationHtml += `</div>`;
            }

            content.innerHTML = `
                <div class="category-section">
                    <div class="category-header">
                        <h2>${cat}</h2>
                        <a href="javascript:void(0)" onclick="renderCategorizedExplore()" class="view-all">${lang === 'ar' ? 'الرجوع للتصنيفات' : 'Back to Categories'}</a>
                    </div>
                    <div class="series-grid">
                        ${paginatedItems.map(s => createCard(s, favIdsStr.includes(String(s.id)))).join('')}
                    </div>
                    ${paginationHtml}
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('search-input').addEventListener('input', async (e) => {
            const term = e.target.value.toLowerCase();
            const content = document.getElementById('explore-content');
            const lang = getCurrentLang();

            if (term.length === 0) {
                renderCategorizedExplore();
                return;
            }

            const [series, favIds] = await Promise.all([getSeries(), getFavs()]);
            let filtered = series.filter(s => 
                (s.title || '').toLowerCase().includes(term) || 
                (s.description || '').toLowerCase().includes(term)
            );

            if (currentFilterType !== 'all') {
                filtered = filtered.filter(s => (s.type || 'series') === currentFilterType);
            }

            const searchTitle = lang === 'ar' ? `نتائج البحث عن: ${e.target.value}` : `Search results for: ${e.target.value}`;
            const noResultsMsg = lang === 'ar' ? 'لا توجد نتائج مطابقة...' : 'No matching results found...';

            content.innerHTML = `
                <div class="category-section">
                    <div class="category-header">
                        <h2>${searchTitle}</h2>
                    </div>
                    <div class="slider-container">
                        <button class="slider-arrow prev" onclick="scrollSlider(this, 1)"><i class="fa-solid fa-chevron-right"></i></button>
                        <div class="category-slider series-grid">
                            ${filtered.length > 0 ? filtered.map(s => createCard(s, favIds.includes(String(s.id)))).join('') : `<p style="padding: 20px; opacity: 0.5;">${noResultsMsg}</p>`}
                        </div>
                        <button class="slider-arrow next" onclick="scrollSlider(this, -1)"><i class="fa-solid fa-chevron-left"></i></button>
                    </div>
                </div>
            `;
        });

        function scrollSlider(btn, direction) {
            const container = btn.parentElement.querySelector('.category-slider');
            const scrollAmount = container.offsetWidth * 0.8;
            container.scrollBy({
                left: direction * scrollAmount,
                behavior: 'smooth'
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type');
            if (type === 'series' || type === 'movie') {
                currentFilterType = type;
                const pills = document.querySelectorAll('.filter-pill');
                pills.forEach(p => {
                    // Check if this pill's onclick matches the type
                    if (p.getAttribute('onclick').includes(`'${type}'`)) {
                        pills.forEach(pill => pill.classList.remove('active'));
                        p.classList.add('active');
                    }
                });
            }
            renderCategorizedExplore();
        });

        // Listen for background data updates
        window.addEventListener('reelar-series-updated', (e) => {
            console.log('Refreshing explore UI with fresh series data...');
            renderCategorizedExplore();
        });

        // --- Logout Logic ---
        document.body.insertAdjacentHTML('beforeend', `
            <div id="logout-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 99999; display: none; align-items: center; justify-content: center; padding: 20px;">
                <div style="background: #161618; width: 100%; max-width: 380px; border-radius: 25px; padding: 35px; border: 1px solid rgba(255,255,255,0.08); text-align: center;">
                    <div style="width: 70px; height: 70px; background: rgba(239, 68, 68, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: #ef4444; font-size: 30px;">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </div>
                    <h3 style="font-size: 22px; margin-bottom: 10px;">تسجيل الخروج</h3>
                    <p style="color: var(--text-muted); font-size: 15px; margin-bottom: 30px; line-height: 1.6;">هل أنت متأكد أنك تريد تسجيل الخروج من حسابك؟</p>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <button onclick="logout()" class="btn btn-accent" style="background: #ef4444; border-color: #ef4444; justify-content: center;">نعم، خروج</button>
                        <button onclick="closeLogoutModal()" class="btn btn-outline" style="justify-content: center;">إلغاء</button>
                    </div>
                </div>
            </div>
        `);

        function openLogoutModal() { document.getElementById('logout-modal').style.display = 'flex'; }
        function closeLogoutModal() { document.getElementById('logout-modal').style.display = 'none'; }
    </script>
</body>

</html>
