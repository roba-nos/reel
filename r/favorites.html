<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetShort | قائمتي المفضلة</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* PC-only Logout styles */
        @media (max-width: 768px) {
            .nav-item-logout-pc { display: none !important; }
        }
        @media (min-width: 769px) {
            .nav-item-logout-pc { margin-top: auto; color: #ef4444 !important; }
            .nav-item-logout-pc:hover { background: rgba(239, 68, 68, 0.1) !important; }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <nav class="bottom-nav">
            <div class="nav-logo">
                <h1
                    style="color: var(--accent); font-size: 35px; font-weight: 800; letter-spacing: -1px; text-shadow: 0 0 15px var(--accent-glow);">
                    Reel<span style="color: white;">Arab</span></h1>
            </div>
            <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span data-t="home">الرئيسية</span></a>
            <a href="explore.html" class="nav-item"><i class="fa-solid fa-compass"></i><span data-t="explore">اكتشف</span></a>
            <a href="reels.html" class="nav-item nav-item-reels"><i class="fa-solid fa-clapperboard"></i><span data-t="reels">ريلز</span></a>
            <a href="favorites.html" class="nav-item active"><i class="fa-solid fa-bookmark"></i><span data-t="favorites">قائمتي</span></a>
            <a href="profile.html" class="nav-item"><i class="fa-solid fa-circle-user"></i><span data-t="profile">ملفي</span></a>
            <a href="#" class="nav-item nav-item-logout-pc" onclick="openLogoutModal()"><i class="fa-solid fa-right-from-bracket"></i><span data-t="logout">خروج</span></a>
        </nav>

        <main style="flex: 1; padding: 40px 20px; max-width: 1200px; margin: 0 auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding: 0 10px;">
                <h1 style="font-size: 32px; font-weight: 900;" data-t="favorites">قائمتي <span style="color: var(--accent);">المفضلة</span></h1>
                <div style="background: rgba(255,255,255,0.03); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--border); font-size: 13px; color: var(--text-muted);">
                    <span id="fav-count">0</span> <span data-t="series_label">مسلسلات</span>
                </div>
            </div>
            
            <div id="favorites-grid" class="series-grid" style="gap: 20px;"></div>
            
            <div id="fav-empty" style="text-align: center; padding: 120px 20px; display: none; background: rgba(255,255,255,0.02); border-radius: 30px; border: 1px dashed var(--border);">
                <div style="width: 80px; height: 80px; background: rgba(255,255,255,0.03); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;">
                    <i class="fa-solid fa-bookmark" style="font-size: 32px; opacity: 0.3;"></i>
                </div>
                <div style="margin-bottom: 30px;">
                    <h2 style="font-size: 28px; font-weight: 800;" data-t="favorites">قائمتي</h2>
                    <p style="color: var(--text-muted); margin-top: 5px;" data-t="saved_items">المسلسلات التي قمت بحفظها لمشاهدتها لاحقاً</p>
                </div>
                <a href="explore.html" class="btn btn-accent" data-t="explore_series">استكشف المسلسلات</a>
            </div>
        </main>
    </div>

    <script src="shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const lang = getCurrentLang();
            const t = translations[lang];
            
            // Get favorite IDs from Cloud
            const favIds = await getFavs();
            const stringIds = favIds.map(f => String(f));
            
            // Fetch fresh data from Cloud to ensure latest posters/titles
            const allSeries = await getSeries();
            const freshFavs = allSeries.filter(s => stringIds.includes(String(s.id)));

            const grid = document.getElementById('favorites-grid');
            const empty = document.getElementById('fav-empty');
            const countEl = document.getElementById('fav-count');
            
            if(countEl) countEl.innerText = freshFavs.length;

            if (freshFavs.length === 0) {
                empty.style.display = 'block';
                grid.innerHTML = '';
            } else {
                empty.style.display = 'none';
                grid.innerHTML = freshFavs.map(s => createCard(s)).join('');
            }
        });

        // --- Logout Logic ---
        document.body.insertAdjacentHTML('beforeend', `
            <div id="logout-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 99999; display: none; align-items: center; justify-content: center; padding: 20px;">
                <div style="background: #161618; width: 100%; max-width: 380px; border-radius: 25px; padding: 35px; border: 1px solid rgba(255,255,255,0.08); text-align: center;">
                    <div style="width: 70px; height: 70px; background: rgba(239, 68, 68, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: #ef4444; font-size: 30px;">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </div>
                    <h3 style="font-size: 22px; margin-bottom: 10px;">تسجيل الخروج</h3>
                    <p style="color: var(--text-muted); font-size: 15px; margin-bottom: 30px; line-height: 1.6;">هل أنت متأكد أنك تريد تسجيل الخروج من حسابك؟</p>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <button onclick="logout()" class="btn btn-accent" style="background: #ef4444; border-color: #ef4444; justify-content: center;">نعم، خروج</button>
                        <button onclick="closeLogoutModal()" class="btn btn-outline" style="justify-content: center;">إلغاء</button>
                    </div>
                </div>
            </div>
        `);

        function openLogoutModal() { document.getElementById('logout-modal').style.display = 'flex'; }
        function closeLogoutModal() { document.getElementById('logout-modal').style.display = 'none'; }
    </script>
</body>

</html>
